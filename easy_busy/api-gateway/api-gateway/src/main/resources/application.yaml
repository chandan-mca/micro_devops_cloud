spring:
  cloud:
    gateway:
      server:
        webflux:
         discovery:
           locator:
             enabled: false
             lower-case-service-id: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      access: READ_ONLY

  application:
    name: API-GATEWAY

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}


  instance:
    preferIpAddress: true



product:
  service:
    id: lb://PRODUCT-SERVICE
cartorder:
  service:
    id: lb://CART-ORDER-SERVICE