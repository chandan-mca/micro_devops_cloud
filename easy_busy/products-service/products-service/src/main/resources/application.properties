spring.application.name=PRODUCT-SERVICE
server.port=8081
# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/productdb?currentSchema=public
spring.datasource.username=user
spring.datasource.password=user
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
# ImageKit
imagekit.id=batchlcwd
imagekit.public-key=public_AksrYlt8twF6jRum4Ya+MbQcLCg=
imagekit.private-key=private_/V3EMSmNRaUXenhWj9E/PnnsKc8=
imagekit.url-endpoint=https://ik.imagekit.io/batchlcwd
imagekit.folder=/products
#configuration of eureka

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.instance.preferIpAddress=true